<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">MacroTemplateKit tutorial flow</title>
  <desc id="desc">A flow showing Template, Statement, and Declaration rendering into SwiftSyntax output.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f1e8"/>
      <stop offset="100%" stop-color="#e2efe5"/>
    </linearGradient>
  </defs>
  <rect width="960" height="240" fill="url(#bg)"/>
  <g font-family="Menlo, Monaco, monospace" text-anchor="middle">
    <rect x="40" y="70" width="180" height="100" rx="18" fill="#ffffff" stroke="#264653" stroke-width="3"/>
    <text x="130" y="110" font-size="24" fill="#264653">Template</text>
    <text x="130" y="140" font-size="16" fill="#264653">Expressions</text>

    <rect x="280" y="70" width="180" height="100" rx="18" fill="#ffffff" stroke="#2a9d8f" stroke-width="3"/>
    <text x="370" y="110" font-size="24" fill="#1d6f66">Statement</text>
    <text x="370" y="140" font-size="16" fill="#1d6f66">Bindings and control flow</text>

    <rect x="520" y="70" width="180" height="100" rx="18" fill="#ffffff" stroke="#e76f51" stroke-width="3"/>
    <text x="610" y="110" font-size="24" fill="#b24e35">Declaration</text>
    <text x="610" y="140" font-size="16" fill="#b24e35">Functions and types</text>

    <rect x="760" y="70" width="160" height="100" rx="18" fill="#ffffff" stroke="#6d597a" stroke-width="3"/>
    <text x="840" y="110" font-size="24" fill="#5a4964">SwiftSyntax</text>
    <text x="840" y="140" font-size="16" fill="#5a4964">Rendered output</text>
  </g>
  <g stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M220 120 H260" stroke="#264653"/>
    <path d="M460 120 H500" stroke="#2a9d8f"/>
    <path d="M700 120 H740" stroke="#e76f51"/>
    <path d="M252 112 L260 120 L252 128" stroke="#264653"/>
    <path d="M492 112 L500 120 L492 128" stroke="#2a9d8f"/>
    <path d="M732 112 L740 120 L732 128" stroke="#e76f51"/>
  </g>
</svg>
